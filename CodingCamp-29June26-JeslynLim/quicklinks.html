<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links</title>
    <style>
        body {
            text-align: center;
        }
        #linkList {
            margin-top: 15px;
        }
        #linkList a {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            background-color: #eee;
            border-radius: 6px;
            text-decoration: none;
            color: black;
        }
        .deleteLink {
            margin-left: 5px;
            cursor: pointer;
            color: red;
            background: none;
            border: none;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h3>Quick Links</h3>
    <input type="text" id="linkName" placeholder="Link Name" />
    <input type="text" id="linkURL" placeholder="URL" />
    <button id="addLink">Add Link</button>

    <div id="linkList">
        <!-- links akan muncul di sini -->
    </div>

    <script>
        let linkList = document.getElementById("linkList")

        // bikin satu link button
        function addLink(name, url) {
            let wrapper = document.createElement("span")

            // button link yang bisa diklik buka website
            let a = document.createElement("a")
            a.textContent = name
            a.href = url
            a.target = "_blank"  // buka di tab baru

            // tombol hapus
            let deleteBtn = document.createElement("button")
            deleteBtn.textContent = "x"
            deleteBtn.className = "deleteLink"
            deleteBtn.addEventListener("click", function() {
                linkList.removeChild(wrapper)
                saveLinks()
            })

            wrapper.appendChild(a)
            wrapper.appendChild(deleteBtn)
            linkList.appendChild(wrapper)
        }

        // tombol Add Link
        document.getElementById("addLink").addEventListener("click", function() {
            let name = document.getElementById("linkName").value.trim()
            let url = document.getElementById("linkURL").value.trim()
            if (name === "" || url === "") return  // kalau ada yang kosong, stop

            // tambahin https:// kalau user lupa
            if (!url.startsWith("http")) url = "https://" + url

            addLink(name, url)
            document.getElementById("linkName").value = ""
            document.getElementById("linkURL").value = ""
            saveLinks()
        })

        // simpan ke local storage
        function saveLinks() {
            let links = []
            linkList.querySelectorAll("span").forEach(function(span) {
                links.push({
                    name: span.querySelector("a").textContent,
                    url: span.querySelector("a").href
                })
            })
            localStorage.setItem("links", JSON.stringify(links))
        }

        // load dari local storage
        function loadLinks() {
            let saved = localStorage.getItem("links")
            if (saved) {
                JSON.parse(saved).forEach(function(link) {
                    addLink(link.name, link.url)
                })
            }
        }

        loadLinks()
    </script>

</body>
</html>
