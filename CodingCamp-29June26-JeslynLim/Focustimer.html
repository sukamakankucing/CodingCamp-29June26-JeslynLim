<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        body {
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>Focus Timer</h3>
    <!-- contenteditable = bisa diklik dan diedit langsung -->
    <h1 id="timer" contenteditable="true">25:00</h1>
    <button id="Start">Start</button>
    <button id="Stop">Stop</button>
    <button id="Reset">Reset</button>

    <script>
        let timerEl = document.getElementById("timer")

        let totalSeconds = 0
        let timerInterval = null
        let originalTime = "25:00"  // simpan waktu awal buat Reset

        // fungsi tampilkan waktu
        function displayTime() {
            let m = Math.floor(totalSeconds / 60)
            let s = totalSeconds % 60
            timerEl.textContent = 
                String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0")
        }

        // tombol Start — baca teks dari h1 langsung
        document.getElementById("Start").addEventListener("click", function() {
            if (timerInterval) return  // kalau udah jalan, jangan dobel

            let text = timerEl.textContent.trim()  // ambil teks dari h1
            originalTime = text  // simpan buat reset nanti

            let parts = text.split(":")  // pisah menit dan detik
            let m = parseInt(parts[0]) || 0
            let s = parseInt(parts[1]) || 0
            totalSeconds = (m * 60) + s

            if (totalSeconds <= 0) return  // kalau 0, jangan jalan

            // nonaktifkan edit saat timer jalan
            timerEl.contentEditable = "false"

            timerInterval = setInterval(function() {
                if (totalSeconds <= 0) {
                    clearInterval(timerInterval)
                    timerInterval = null
                    timerEl.textContent = "Time's up!"
                    return
                }
                totalSeconds--
                displayTime()
            }, 1000)
        })

        // tombol Stop
        document.getElementById("Stop").addEventListener("click", function() {
            clearInterval(timerInterval)
            timerInterval = null
            // aktifkan edit lagi saat stop
            timerEl.contentEditable = "true"
        })

        // tombol Reset
        document.getElementById("Reset").addEventListener("click", function() {
            clearInterval(timerInterval)
            timerInterval = null
            totalSeconds = 0
            timerEl.textContent = originalTime  // balik ke waktu awal
            timerEl.contentEditable = "true"  // aktifkan edit lagi
        })
    </script>

</body>
</html>
