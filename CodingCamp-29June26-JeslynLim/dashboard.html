<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- GREETING - full width -->
    <div id="greeting-section">
        <h1 id="time"></h1>
        <h3 id="date"></h3>
        <h2 id="greeting"></h2>
        <!-- Custom name -->
        <div id="name-section">
            <input type="text" id="nameInput" placeholder="Enter your name..." />
            <button id="saveName">Save</button>
        </div>
    </div>

    <!-- TENGAH - timer + todo -->
    <div id="middle-section">

        <!-- FOCUS TIMER -->
        <div class="card" id="timer-card">
            <h3>Focus Timer</h3>
            <h1 id="timer" contenteditable="true">25:00</h1>
            <!-- Pomodoro presets -->
            <div id="presets">
                <button class="preset-btn" data-time="25:00">25 min</button>
                <button class="preset-btn" data-time="10:00">10 min</button>
                <button class="preset-btn" data-time="05:00">5 min</button>
            </div>
            <div id="timer-controls">
                <button id="Start">Start</button>
                <button id="Stop">Stop</button>
                <button id="Reset">Reset</button>
            </div>
        </div>

        <!-- TO-DO LIST -->
        <div class="card">
            <h3>Tasks</h3>
            <input type="text" id="taskInput" placeholder="Add a new task.." />
            <button id="addTask">Add</button>
            <p id="duplicateMsg" style="color: red; font-size: 13px; display: none;">Task already exists!</p>
            <ul id="taskList">
                <!-- task akan muncul di sini -->
            </ul>
        </div>

    </div>

    <!-- QUICK LINKS - full width -->
    <div id="links-section">
        <h3>Quick Links</h3>
        <input type="text" id="linkName" placeholder="Link Name" />
        <input type="text" id="linkURL" placeholder="URL" />
        <button id="addLink">Add Link</button>
        <div id="linkList">
            <!-- links akan muncul di sini -->
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
